version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: botboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: socialmedia
      POSTGRES_USER: socialmedia
      POSTGRES_PASSWORD: socialmedia_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialmedia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
